<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Student Registration</h2>

    <form id="studentForm">

        <input type="number"
               id="id"
               placeholder="Student ID"
               required>

        <input type="text"
               id="name"
               placeholder="Student Name"
               required>

        <input type="number"
               id="age"
               placeholder="Age"
               required>

        <input type="text"
               id="department"
               placeholder="Department"
               required>

        <button type="submit">
            Save Student
        </button>

    </form>

    <h3 id="message"></h3>

</div>

<script src="script.js"></script>

</body>
</html>3
